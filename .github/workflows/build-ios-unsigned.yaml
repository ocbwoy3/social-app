name: Build social-app IPA (unsigned, re-signable)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest # or macos-26-xlarge if Xcode 26 needed
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 5

      - name: 🔧 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: 🪛 Setup jq
        uses: dcarbone/install-jq-action@v2

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "latest-stable" # use whatever matches the repo's requirements

      - name: ☕️ Setup Cocoapods
        uses: maxim-lobanov/setup-cocoapods@v1
        with:
          version: 1.16.2

      - name: ⚙️ Install JS dependencies
        run: yarn install --frozen-lockfile

      - name: 🔤 Compile translations
        run: yarn intl:build

      - name: ✏️ Write environment variables
        run: |
          # Minimal .env — omit secrets that aren't needed for a local build
          echo "EXPO_PUBLIC_RELEASE_VERSION=$(jq -r '.version' package.json)" >> .env
          echo "EXPO_PUBLIC_BUNDLE_IDENTIFIER=$(git rev-parse HEAD)" >> .env
          echo "EXPO_PUBLIC_BUNDLE_DATE=$(date -u +"%y%m%d%H")" >> .env

      # This generates the ios/ native project without building or signing
      - name: 🏗️ Prebuild (generate native iOS project via Expo)
        run: npx expo prebuild --platform ios --no-install

      - name: 🔧 Copy assets into generated iOS directory
        run: cp -R assets/. ios/Bluesky/

      - name: 📦 Install Pods
        run: |
          cd ios
          pod install

      - name: 🔍 Debug - list ios directory
        run: ls -la ios/

      - name: 🔨 Archive (no code signing)
        run: |
          set -o pipefail
          xcodebuild archive \
            -workspace ios/Bluesky.xcworkspace \
            -scheme Bluesky \
            -archivePath $RUNNER_TEMP/Bluesky.xcarchive \
            -sdk iphoneos \
            -arch arm64 \
            -configuration Release \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: 📦 Upload RUNNER_TEMP for inspection
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runner-temp-debug
          path: ${{ runner.temp }}/

      - name: 🔍 Debug - list xcarchive contents
        run: find $RUNNER_TEMP/Bluesky.xcarchive -type d

      - name: 📦 Package unsigned IPA
        run: |
          mkdir -p $RUNNER_TEMP/Payload
          cp -r "$RUNNER_TEMP/Bluesky.xcarchive/Products/Applications/Bluesky.app" \
            $RUNNER_TEMP/Payload/
          cd $RUNNER_TEMP
          zip -r TV-Time.ipa Payload/

      - name: ⬆️ Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TV-Time.ipa
          path: ${{ runner.temp }}/TV-Time.ipa
